
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>RETO 2</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: auto;
      padding: 30px;
    }

    h1, h2, h3 {
      text-align: center;
      color: #333;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 10px;
    }

    input[type="text"],
    input[type="email"] {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    input[type="radio"] {
      margin-right: 5px;
    }

    .radio-group {
      margin-bottom: 20px;
    }

    .submit-btn {
      display: block;
      width: 100%;
      padding: 10px;
      background-color: #007BFF;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 20px;
    }

    .submit-btn:hover {
      background-color: #0056b3;
    }

    #datosUsuario {
      display: none;
    }
  </style>
  <script>
    function mostrarDatosUsuario() {
      const opcionAlta = document.getElementById("opcion1").checked;
      const datosUsuario = document.getElementById("datosUsuario");
      datosUsuario.style.display = opcionAlta ? "block" : "none";
    }
  </script>
</head>
<body>
  <div class="container">
    <h1>Menú Principal</h1>
    <h2>¿Cuál es el ID?</h2>

    <form action="reto2.php" method="post">
      <input type="text" name="identi" required>

      <h3>Selecciona una opción:</h3>
      <div class="radio-group">
        <input type="radio" id="opcion1" name="opcion" value="1" onclick="mostrarDatosUsuario()">
        <label for="opcion1">Alta</label>

        <input type="radio" id="opcion2" name="opcion" value="2" onclick="mostrarDatosUsuario()">
        <label for="opcion2">Baja</label>

        <input type="radio" id="opcion3" name="opcion" value="3" onclick="mostrarDatosUsuario()">
        <label for="opcion3">Consulta</label>

        <input type="radio" id="opcion4" name="opcion" value="4" onclick="mostrarDatosUsuario()">
        <label for="opcion4">Modificación</label>
      </div>

      <div id="datosUsuario">
        <h3>Datos del usuario:</h3>
        <label for="firstname">Nombre:</label>
        <input type="text" name="firstname">

        <label for="lastname">Apellido:</label>
        <input type="text" name="lastname">

        <label for="email">Email:</label>
        <input type="email" name="email">
      </div>

      <input type="submit" value="Continuar" class="submit-btn">
    </form>
  </div>
</body>
</html>
